<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Perpay Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0, 180, 255, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 20px rgba(150, 80, 255, 0.8),
        0 0 60px rgba(150, 80, 255, 0.4);
      margin-bottom: 3rem;
      text-align: center;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(150, 80, 255, 0.8), 0 0 60px rgba(150, 80, 255, 0.4); }
      50%       { text-shadow: 0 0 30px rgba(150, 80, 255, 1),   0 0 90px rgba(150, 80, 255, 0.6); }
    }

    .games {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 240px;
      height: 160px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .game-card::after {
      content: '▶  PLAY';
      position: absolute;
      bottom: 0.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      opacity: 0.6;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: rgba(150, 80, 255, 0.8);
      background: rgba(150, 80, 255, 0.15);
      box-shadow: 0 8px 40px rgba(150, 80, 255, 0.4);
    }

    .game-card:active {
      transform: translateY(-2px) scale(1.01);
    }

    .game-icon {
      font-size: 2.4rem;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Play Perpay Games</h1>
  <div class="games">
    <a class="game-card" href="perpay-credit-runner.html">
      <span class="game-icon">💳</span>
      Credit Score Runner
    </a>
    <a class="game-card" href="perpay-loan-runner.html">
      <span class="game-icon">🏦</span>
      Loan Runner
    </a>
  </div>
</body>
</html>
